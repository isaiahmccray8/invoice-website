<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Isaiah Business Invoices</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
  <!-- Navigation -->
  <nav class="border-b border-purple-500/20 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-cyan-400 bg-clip-text text-transparent">
        Isaiah Business Invoices
      </h1>
      <div class="flex items-center gap-4">
        <span id="userEmail" class="text-gray-400 text-sm"></span>
        <button
          onclick="logout()"
          class="text-gray-400 hover:text-white transition border border-purple-500/30 px-4 py-2 rounded-lg hover:border-purple-500 hover:bg-purple-500/10"
        >
          Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-12">
      <div>
        <h2 class="text-4xl font-bold text-white mb-2">Dashboard</h2>
        <p class="text-gray-400">Manage your invoices and track payments</p>
      </div>
      <div class="flex gap-3">
        <button
          onclick="refreshDashboard()"
          class="bg-purple-500/20 border border-purple-500/50 text-purple-300 px-6 py-3 rounded-lg font-semibold hover:bg-purple-500/30 transition"
          title="Refresh invoice list"
        >
          ↻ Refresh
        </button>
        <a
          href="invoice-create.html"
          class="bg-gradient-to-r from-purple-600 to-cyan-600 text-white px-8 py-3 rounded-lg font-semibold hover:shadow-lg hover:shadow-purple-500/50 transition transform hover:scale-105"
        >
          + New Invoice
        </a>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="grid md:grid-cols-4 gap-6 mb-12">
      <div class="bg-gradient-to-br from-purple-500/10 to-cyan-500/10 rounded-xl border border-purple-500/20 p-6">
        <div class="text-sm text-gray-400 mb-2">Total Invoices</div>
        <div id="totalInvoices" class="text-4xl font-bold text-white">0</div>
      </div>
      <div class="bg-gradient-to-br from-green-500/10 to-emerald-500/10 rounded-xl border border-green-500/20 p-6">
        <div class="text-sm text-gray-400 mb-2">Paid</div>
        <div id="paidInvoices" class="text-4xl font-bold text-green-400">0</div>
      </div>
      <div class="bg-gradient-to-br from-yellow-500/10 to-orange-500/10 rounded-xl border border-yellow-500/20 p-6">
        <div class="text-sm text-gray-400 mb-2">Pending</div>
        <div id="pendingInvoices" class="text-4xl font-bold text-yellow-400">0</div>
      </div>
      <div class="bg-gradient-to-br from-purple-500/10 to-pink-500/10 rounded-xl border border-purple-500/20 p-6">
        <div class="text-sm text-gray-400 mb-2">Total Revenue</div>
        <div id="totalRevenue" class="text-4xl font-bold text-purple-400">$0</div>
      </div>
    </div>

    <!-- Invoices Table -->
    <div class="bg-gradient-to-br from-purple-500/10 to-cyan-500/10 rounded-xl border border-purple-500/20 overflow-hidden">
      <div class="px-6 py-4 border-b border-purple-500/20">
        <h3 class="text-xl font-bold text-white">Recent Invoices</h3>
      </div>

      <div id="invoicesContainer" class="divide-y divide-purple-500/20">
        <div class="p-6 text-center text-gray-400">Loading invoices...</div>
      </div>
    </div>
  </div>

  <!-- Invoice Modal -->
  <div id="invoiceModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-gradient-to-br from-purple-900/90 to-slate-900/90 rounded-2xl border border-purple-500/20 max-w-2xl w-full max-h-96 overflow-y-auto">
      <div class="p-6">
        <div class="flex justify-between items-start mb-4">
          <h3 id="modalTitle" class="text-2xl font-bold text-white">Invoice Details</h3>
          <button
            onclick="closeModal()"
            class="text-gray-400 hover:text-white transition text-2xl"
          >
            ×
          </button>
        </div>
        <div id="modalContent" class="space-y-4 text-gray-300"></div>
        <div class="flex gap-3 mt-6">
          <button
            id="shareBtn"
            class="flex-1 bg-gradient-to-r from-purple-600 to-cyan-600 text-white px-4 py-2 rounded-lg font-semibold hover:shadow-lg transition"
          >
            Share Link
          </button>
          <button
            id="downloadBtn"
            class="flex-1 bg-purple-500/20 text-purple-400 px-4 py-2 rounded-lg font-semibold hover:bg-purple-500/30 transition"
          >
            Download PDF
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/invoice.js"></script>
  <script>
    let currentInvoice = null;

    // Auto-authenticate if in admin mode
    async function setupAdminMode() {
      const adminMode = localStorage.getItem('adminMode');
      if (adminMode && !localStorage.getItem('token')) {
        try {
          // Register/login as admin user
          const response = await fetch('http://localhost:5000/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: 'admin@isaiahbusiness.local',
              password: 'admin123!@#',
              businessName: 'Isaiah Business Invoices',
              businessEmail: 'isaiahmccray8@gmail.com'
            })
          });

          if (response.ok) {
            const data = await response.json();
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
          } else {
            // User might already exist, try logging in
            const loginResponse = await fetch('http://localhost:5000/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: 'admin@isaiahbusiness.local',
                password: 'admin123!@#'
              })
            });

            if (loginResponse.ok) {
              const data = await loginResponse.json();
              localStorage.setItem('token', data.token);
              localStorage.setItem('user', JSON.stringify(data.user));
            }
          }
        } catch (error) {
          console.log('Admin setup error:', error);
        }
      }
    }

    // Check if logged in
    if (!localStorage.getItem('token') && !localStorage.getItem('adminMode')) {
      window.location.href = 'index.html';
    }

    // Load invoices on page load
    document.addEventListener('DOMContentLoaded', async () => {
      await setupAdminMode();
      await loadInvoices();
      displayUserInfo();
    });

    async function loadInvoices() {
      const token = localStorage.getItem('token');
      if (!token) {
        console.log('No token, waiting for admin setup');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/invoices/owner/list`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });

        if (!response.ok) {
          throw new Error('Failed to load invoices');
        }

        const invoices = await response.json();
        displayInvoices(invoices);
        updateStats(invoices);
      } catch (error) {
        console.error('Error loading invoices:', error);
        document.getElementById('invoicesContainer').innerHTML =
          '<div class="p-6 text-center text-red-400">Failed to load invoices</div>';
      }
    }

    function displayInvoices(invoices) {
      const container = document.getElementById('invoicesContainer');

      if (invoices.length === 0) {
        container.innerHTML = `
          <div class="p-6 text-center text-gray-400">
            <p class="text-lg mb-4">No invoices yet</p>
            <a href="invoice-create.html" class="text-purple-400 hover:text-purple-300">
              Create your first invoice →
            </a>
          </div>
        `;
        return;
      }

      container.innerHTML = invoices
        .map(
          (invoice) => `
        <div class="p-4 bg-purple-900/20 hover:bg-purple-500/15 transition border-l-4 border-purple-500 rounded-r-lg">
          <div class="flex justify-between items-start mb-3">
            <div>
              <div class="flex items-center gap-2 mb-2">
                <p class="font-bold text-xl text-cyan-400">${invoice.invoiceNumber}</p>
                <button
                  onclick="copyToClipboard('${invoice.invoiceNumber}', event)"
                  class="text-xs px-2 py-1 bg-cyan-500/20 border border-cyan-500/50 text-cyan-300 rounded hover:bg-cyan-500/30 transition"
                  title="Copy invoice code">
                  📋 Copy Code
                </button>
              </div>
              <p class="text-sm text-gray-400">${invoice.clientName} • ${invoice.clientEmail}</p>
            </div>
            <span class="text-xs px-3 py-1 rounded font-semibold ${
                invoice.status === 'paid'
                  ? 'bg-green-500/20 text-green-400'
                  : invoice.status === 'sent'
                    ? 'bg-yellow-500/20 text-yellow-400'
                    : 'bg-purple-500/20 text-purple-400'
              }">
                ${invoice.status.charAt(0).toUpperCase() + invoice.status.slice(1)}
              </span>
            </div>
            <div class="flex justify-between items-center gap-4 mt-3">
              <div class="cursor-pointer hover:opacity-80" onclick="viewInvoice('${invoice.id}', this)">
                <p class="text-xs text-gray-400">Client will pay:</p>
                <p class="font-bold text-2xl text-green-400">$${invoice.totalWithFee.toFixed(2)}</p>
                <p class="text-xs text-gray-500">(Base: $${invoice.total.toFixed(2)} + 3% fee)</p>
              </div>
              <div class="flex gap-2">
                <button
                  onclick="sharePaymentLink('${invoice.invoiceNumber}', event)"
                  class="px-4 py-2 bg-green-500/20 border border-green-500/50 text-green-300 rounded hover:bg-green-500/30 transition text-sm font-semibold"
                  title="Share payment link with client">
                  💰 Share Payment
                </button>
                <button
                  onclick="viewInvoice('${invoice.id}', event)"
                  class="px-4 py-2 bg-purple-500/20 border border-purple-500/50 text-purple-300 rounded hover:bg-purple-500/30 transition text-sm font-semibold"
                  title="View invoice details">
                  👁️ View
                </button>
              </div>
            </div>
        </div>
      `
        )
        .join('');
    }

    function updateStats(invoices) {
      const total = invoices.length;
      const paid = invoices.filter((i) => i.status === 'paid').length;
      const pending = invoices.filter((i) => i.status !== 'paid').length;
      const revenue = invoices
        .filter((i) => i.status === 'paid')
        .reduce((sum, i) => sum + i.total, 0);

      document.getElementById('totalInvoices').textContent = total;
      document.getElementById('paidInvoices').textContent = paid;
      document.getElementById('pendingInvoices').textContent = pending;
      document.getElementById('totalRevenue').textContent = `$${revenue.toFixed(2)}`;
    }

    function displayUserInfo() {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      document.getElementById('userEmail').textContent = user.email || 'User';
    }

    async function viewInvoice(invoiceId, element) {
      const token = localStorage.getItem('token');

      try {
        const response = await fetch(`${API_URL}/invoices/${invoiceId}`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });

        const invoice = await response.json();
        currentInvoice = invoice;

        const modal = document.getElementById('invoiceModal');
        document.getElementById('modalTitle').textContent = `Invoice ${invoice.invoiceNumber}`;

        const content = `
          <p><strong>Client:</strong> ${invoice.clientName}</p>
          <p><strong>Email:</strong> ${invoice.clientEmail}</p>
          <p><strong>Amount:</strong> $${invoice.total.toFixed(2)}</p>
          <p><strong>With Fee:</strong> $${invoice.totalWithFee.toFixed(2)}</p>
          <p><strong>Due Date:</strong> ${new Date(invoice.dueDate).toLocaleDateString()}</p>
          <p><strong>Status:</strong>
            <span class="px-2 py-1 rounded text-sm ${
              invoice.status === 'paid'
                ? 'bg-green-500/20 text-green-400'
                : 'bg-yellow-500/20 text-yellow-400'
            }">
              ${invoice.status}
            </span>
          </p>
        `;

        document.getElementById('modalContent').innerHTML = content;

        document.getElementById('shareBtn').onclick = () => shareInvoice(invoice.invoiceNumber);
        document.getElementById('downloadBtn').onclick = () => downloadPDF(invoiceId);

        modal.classList.remove('hidden');
      } catch (error) {
        console.error('Error loading invoice:', error);
      }
    }

    function shareInvoice(invoiceNumber) {
      const shareUrl = `${window.location.origin}/view-invoices.html`;
      const shareMessage = `Invoice Link: ${shareUrl}\nInvoice Number: ${invoiceNumber}\n\nPlease visit the link above and search for invoice ${invoiceNumber} to view and pay.`;

      navigator.clipboard.writeText(shareMessage).then(() => {
        alert('Invoice details copied to clipboard!\n\n' + shareMessage);
      }).catch(() => {
        alert('Invoice details:\n\n' + shareMessage);
      });
    }

    function downloadPDF(invoiceId) {
      alert('PDF download feature coming soon!');
    }

    function closeModal() {
      document.getElementById('invoiceModal').classList.add('hidden');
    }

    function refreshDashboard() {
      // Reload invoices
      loadInvoices();
      // Visual feedback
      const btn = event.target;
      btn.style.transform = 'rotate(180deg)';
      setTimeout(() => {
        btn.style.transform = 'rotate(0deg)';
      }, 500);
    }

    function copyToClipboard(text, event) {
      event.stopPropagation();
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = '✓ Copied!';
        setTimeout(() => {
          btn.textContent = originalText;
        }, 2000);
      }).catch(() => {
        alert('Invoice Code: ' + text);
      });
    }

    function sharePaymentLink(invoiceNumber, event) {
      event.stopPropagation();
      const shareUrl = `${window.location.origin}/view-invoices.html`;
      const message = `Please pay Invoice: ${invoiceNumber}\n\nVisit: ${shareUrl}\nSearch for invoice code: ${invoiceNumber}`;
      navigator.clipboard.writeText(message).then(() => {
        alert('Payment link copied:\n\n' + message);
      }).catch(() => {
        alert(message);
      });
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
