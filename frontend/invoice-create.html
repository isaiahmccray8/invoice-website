<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Invoice - Isaiah Business Invoices</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
  <!-- Navigation -->
  <nav class="border-b border-purple-500/20 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="dashboard.html" class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-cyan-400 bg-clip-text text-transparent">
        Isaiah Business Invoices
      </a>
      <a href="dashboard.html" class="text-gray-400 hover:text-white transition">
        ← Back to Dashboard
      </a>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="mb-8">
      <h2 class="text-4xl font-bold text-white mb-2">Create Invoice</h2>
      <p class="text-gray-400">Fill in the details to create a beautiful invoice</p>
    </div>

    <!-- Form -->
    <form id="invoiceForm" class="bg-gradient-to-br from-purple-500/10 to-cyan-500/10 rounded-2xl border border-purple-500/20 p-8 space-y-8">
      <!-- Client Info -->
      <div class="space-y-4">
        <h3 class="text-xl font-bold text-white">Client Information</h3>
        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-300 text-sm font-semibold mb-2">Client Name</label>
            <input
              type="text"
              id="clientName"
              required
              class="w-full bg-purple-900/30 border border-purple-500/30 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition"
              placeholder="John Doe"
            />
          </div>
          <div>
            <label class="block text-gray-300 text-sm font-semibold mb-2">Client Email</label>
            <input
              type="email"
              id="clientEmail"
              required
              class="w-full bg-purple-900/30 border border-purple-500/30 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition"
              placeholder="client@example.com"
            />
          </div>
        </div>
      </div>

      <!-- Invoice Items -->
      <div class="space-y-4">
        <div class="flex justify-between items-center">
          <h3 class="text-xl font-bold text-white">Invoice Items</h3>
          <button
            type="button"
            onclick="addItem()"
            class="text-purple-400 hover:text-purple-300 text-sm font-semibold transition"
          >
            + Add Item
          </button>
        </div>

        <div id="itemsContainer" class="space-y-3">
          <div class="item-row grid md:grid-cols-12 gap-3 bg-purple-900/20 p-4 rounded-lg">
            <input
              type="text"
              placeholder="Description"
              class="md:col-span-5 bg-purple-900/30 border border-purple-500/30 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition item-description"
            />
            <input
              type="number"
              placeholder="Qty"
              value="1"
              class="md:col-span-2 bg-purple-900/30 border border-purple-500/30 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition item-quantity"
            />
            <input
              type="number"
              placeholder="Rate"
              value="0"
              class="md:col-span-3 bg-purple-900/30 border border-purple-500/30 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition item-rate"
            />
            <button
              type="button"
              onclick="removeItem(this)"
              class="md:col-span-2 text-red-400 hover:text-red-300 font-semibold transition"
            >
              Remove
            </button>
          </div>
        </div>
      </div>

      <!-- Dates -->
      <div class="space-y-4">
        <h3 class="text-xl font-bold text-white">Dates</h3>
        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-300 text-sm font-semibold mb-2">Issue Date</label>
            <input
              type="date"
              id="issueDate"
              required
              class="w-full bg-purple-900/30 border border-purple-500/30 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition"
            />
          </div>
          <div>
            <label class="block text-gray-300 text-sm font-semibold mb-2">Due Date</label>
            <input
              type="date"
              id="dueDate"
              required
              class="w-full bg-purple-900/30 border border-purple-500/30 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition"
            />
          </div>
        </div>
      </div>

      <!-- Notes -->
      <div class="space-y-4">
        <h3 class="text-xl font-bold text-white">Additional Info</h3>
        <div>
          <label class="block text-gray-300 text-sm font-semibold mb-2">Notes</label>
          <textarea
            id="notes"
            rows="4"
            class="w-full bg-purple-900/30 border border-purple-500/30 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition"
            placeholder="Add any additional notes or terms..."
          ></textarea>
        </div>
      </div>

      <!-- Summary -->
      <div class="bg-purple-900/30 border border-purple-500/20 rounded-lg p-6 space-y-3">
        <div class="flex justify-between text-gray-300">
          <span>Subtotal:</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="flex justify-between text-gray-300">
          <span>Payment Fee (3%):</span>
          <span id="fee">$0.00</span>
        </div>
        <div class="border-t border-purple-500/20 pt-3 flex justify-between">
          <span class="font-bold text-white">Total:</span>
          <span id="total" class="font-bold text-purple-400 text-lg">$0.00</span>
        </div>
      </div>

      <!-- Error Message -->
      <div id="errorMessage" class="hidden bg-red-900/30 border border-red-500/50 text-red-300 rounded-lg p-3"></div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-purple-600 to-cyan-600 text-white font-semibold py-4 rounded-lg hover:shadow-lg hover:shadow-purple-500/50 transition transform hover:scale-105"
      >
        Create Invoice
      </button>
    </form>
  </div>

  <script src="js/main.js"></script>
  <script>
    // Auto-authenticate if in admin mode
    async function setupAdminMode() {
      const adminMode = localStorage.getItem('adminMode');
      if (adminMode && !localStorage.getItem('token')) {
        try {
          // Register/login as admin user
          const response = await fetch(`${API_URL}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: 'admin@isaiahbusiness.local',
              password: 'admin123!@#',
              businessName: 'Isaiah Business Invoices',
              businessEmail: 'isaiahmccray8@gmail.com'
            })
          });

          if (response.ok) {
            const data = await response.json();
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
          } else {
            // User might already exist, try logging in
            const loginResponse = await fetch(`${API_URL}/auth/login`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: 'admin@isaiahbusiness.local',
                password: 'admin123!@#'
              })
            });

            if (loginResponse.ok) {
              const data = await loginResponse.json();
              localStorage.setItem('token', data.token);
              localStorage.setItem('user', JSON.stringify(data.user));
            }
          }
        } catch (error) {
          console.log('Admin setup error:', error);
        }
      }
    }

    // Check if logged in or in admin mode
    if (!localStorage.getItem('token') && !localStorage.getItem('adminMode')) {
      window.location.href = 'index.html';
    }

    // Set up admin mode on page load
    document.addEventListener('DOMContentLoaded', async () => {
      await setupAdminMode();

      // Set today's date as default
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('issueDate').value = today;

      // Set due date to 30 days from today
      const dueDate = new Date();
      dueDate.setDate(dueDate.getDate() + 30);
      document.getElementById('dueDate').value = dueDate.toISOString().split('T')[0];

      // Add default empty item row
      addItem();
    });

    function addItem() {
      const container = document.getElementById('itemsContainer');
      const itemRow = document.createElement('div');
      itemRow.className = 'item-row grid md:grid-cols-12 gap-3 bg-purple-900/20 p-4 rounded-lg items-end';
      itemRow.innerHTML = `
        <input
          type="text"
          placeholder="Description"
          class="md:col-span-4 bg-purple-900/30 border border-purple-500/30 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition item-description"
          onchange="calculateTotal()"
          oninput="calculateTotal()"
        />
        <input
          type="number"
          placeholder="Qty"
          value="1"
          class="md:col-span-2 bg-purple-900/30 border border-purple-500/30 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition item-quantity"
          onchange="calculateTotal()"
          oninput="calculateTotal()"
        />
        <input
          type="number"
          placeholder="Rate"
          value="0"
          class="md:col-span-2 bg-purple-900/30 border border-purple-500/30 rounded px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition item-rate"
          onchange="calculateTotal()"
          oninput="calculateTotal()"
        />
        <div class="md:col-span-2 bg-gradient-to-r from-green-500/20 to-emerald-500/20 border border-green-500/30 rounded px-3 py-2 text-white font-bold item-amount">
          $0.00
        </div>
        <button
          type="button"
          onclick="removeItem(this)"
          class="md:col-span-2 text-red-400 hover:text-red-300 font-semibold transition hover:bg-red-500/10 py-2 px-3 rounded"
        >
          Remove
        </button>
      `;
      container.appendChild(itemRow);
      calculateTotal();
    }

    function removeItem(button) {
      button.closest('.item-row').remove();
      calculateTotal();
    }

    function calculateTotal() {
      const rows = document.querySelectorAll('.item-row');
      let subtotal = 0;

      rows.forEach((row) => {
        const qty = parseFloat(row.querySelector('.item-quantity').value) || 0;
        const rate = parseFloat(row.querySelector('.item-rate').value) || 0;
        const amount = qty * rate;

        // Update the amount display for this row
        const amountDisplay = row.querySelector('.item-amount');
        if (amountDisplay) {
          amountDisplay.textContent = `$${amount.toFixed(2)}`;
        }

        subtotal += amount;
      });

      const fee = subtotal * 0.03;
      const total = subtotal + fee;

      document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('fee').textContent = `$${fee.toFixed(2)}`;
      document.getElementById('total').textContent = `$${total.toFixed(2)}`;
    }

    // Form submission
    document.getElementById('invoiceForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const clientName = document.getElementById('clientName').value;
      const clientEmail = document.getElementById('clientEmail').value;
      const issueDate = document.getElementById('issueDate').value;
      const dueDate = document.getElementById('dueDate').value;
      const notes = document.getElementById('notes').value;

      // Collect items
      const items = [];
      document.querySelectorAll('.item-row').forEach((row) => {
        const description = row.querySelector('.item-description').value;
        const quantity = parseFloat(row.querySelector('.item-quantity').value) || 0;
        const rate = parseFloat(row.querySelector('.item-rate').value) || 0;

        if (description && quantity > 0 && rate > 0) {
          items.push({ description, quantity, rate });
        }
      });

      if (items.length === 0) {
        showError('Please add at least one item');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/invoices`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify({
            clientName,
            clientEmail,
            items,
            issueDate,
            dueDate,
            notes,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.message || 'Failed to create invoice');
          return;
        }

        // Show success confirmation with invoice details
        const invoice = data.invoice;
        const confirmationMessage = `
✅ Invoice Saved Successfully!

Invoice Number: ${invoice.invoiceNumber}
Client: ${invoice.clientName}
Email: ${invoice.clientEmail}

Items (${invoice.items?.length || 0}):
${invoice.items?.map(item => `• ${item.description}: Qty ${item.quantity} × $${item.rate} = $${item.amount.toFixed(2)}`).join('\n')}

Subtotal: $${invoice.subtotal.toFixed(2)}
Payment Fee (3%): $${invoice.paymentFee.toFixed(2)}
Total (to charge): $${invoice.totalWithFee.toFixed(2)}

Status: ${invoice.status}
${invoice.notes ? `\nNotes: ${invoice.notes}` : ''}

Redirecting to dashboard...
        `;
        alert(confirmationMessage);
        // Force reload to show new invoice
        window.location.href = 'dashboard.html?refresh=' + Date.now();
      } catch (error) {
        console.error('Error:', error);
        showError('An error occurred. Please try again.');
      }
    });

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.classList.remove('hidden');
    }

    // Calculate total on load
    calculateTotal();
  </script>
</body>
</html>
